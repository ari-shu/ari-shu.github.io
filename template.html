<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Title – Ariella Shulman</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.8;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    .back {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #666;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 48px;
    }

    .back:hover {
      color: #1a1a1a;
    }

    .meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 48px;
    }

    p {
      margin-bottom: 24px;
      font-size: 1.1rem;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 48px;
      margin-bottom: 24px;
    }

    a {
      color: #1a1a1a;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: #ccc;
    }

    a:hover {
      text-decoration-color: #1a1a1a;
    }

    blockquote {
      border-left: 2px solid #ddd;
      padding-left: 20px;
      margin: 32px 0;
      color: #555;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .container { padding: 48px 20px 80px; }
      h1 { font-size: 1.6rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back">← Back</a>

    <p class="meta">Month Year</p>
    <h1>Article Title</h1>

    <p>
      Opening paragraph goes here.
    </p>

    <h2>Section Heading</h2>

    <p>
      Section content goes here.
    </p>

    <blockquote>
      Pull quote or key insight goes here.
    </blockquote>

    <p>
      Closing thoughts.
    </p>

  </div>
</body>
</html>
